<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELEVYA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav class="navbar section-content">
            <a href="#" class="nav-logo"><h1 class="fas fa-envelope"> ELEVYA</h1></a>
            <ul class="nav-option">
                <li class="nav-item"><a href="home.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="login.html" class="nav-link active">login</a></li>
                <li class="nav-item"><a href="#" class="nav-link">Contact us</a></li>
            </ul>
        </nav>
    </header>
    <section class="resume-container login-container">
        <div class="resume-header">
            <h1 class="resume-title">Login to Your Account</h1>
            <p class="switch-login">Don't have an account? <a href="registration.html" class="registration-link">Register here</a></p>
        </div>
        <form class="resume-form" id="loginForm">
            <h2><i class="fas fa-user"></i> User Login</h2>
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-user"></i>
                    <input type="text" class="form-input" name="username" placeholder="Username or Email *" required>
                    <span class="error-message">Please enter your username or email</span>
                </div>
            </div>
            <div class="form-group">
                <div class="input-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" class="form-input" name="password" placeholder="Password *" required>
                    <span class="error-message">Please enter your password</span>
                </div>
            </div>
            <div class="form-options">
                <div class="checkbox-group">
                    <input type="checkbox" id="remember-me" name="rememberMe">
                    <label for="remember-me">Remember Me</label>
                </div>
                <a href="forgot-password.html" class="forgot-password">Forgot Password?</a>
            </div>
            <button type="submit" class="registration-button">Login</button>
            
            <div class="social-login">
                <p>Or continue with</p>
                <div class="social-buttons">
                    <button type="button" class="social-btn" onclick="alert('Google login not implemented in demo')">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="social-btn" onclick="alert('LinkedIn login not implemented in demo')">
                        <i class="fab fa-linkedin"></i> LinkedIn
                    </button>
                </div>
            </div>
        </form>
    </section>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Login page loaded');
            
            const loginForm = document.getElementById('loginForm');
            const inputs = loginForm.querySelectorAll('.form-input');
            
            if (!loginForm) {
                console.error('Login form not found!');
                return;
            }
            
            // Validation functions
            function validateEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }
            
            function validateUsername(username) {
                const usernameRegex = /^[a-zA-Z0-9_]{3,20}$/;
                return usernameRegex.test(username);
            }
            
            function showError(input, message) {
                input.classList.remove('valid');
                input.classList.add('invalid');
                const errorSpan = input.parentElement.querySelector('.error-message');
                if (errorSpan) {
                    if (message) errorSpan.textContent = message;
                    errorSpan.style.display = 'block';
                }
            }
            
            function showSuccess(input) {
                input.classList.remove('invalid');
                input.classList.add('valid');
                const errorSpan = input.parentElement.querySelector('.error-message');
                if (errorSpan) {
                    errorSpan.style.display = 'none';
                }
            }
            
            function clearValidation(input) {
                input.classList.remove('valid', 'invalid');
                const errorSpan = input.parentElement.querySelector('.error-message');
                if (errorSpan) {
                    errorSpan.style.display = 'none';
                }
            }
            
            // Real-time validation for login form
            inputs.forEach(input => {
                input.addEventListener('blur', function() {
                    const value = this.value.trim();
                    const name = this.name;
                    
                    // Required field validation
                    if (this.required && !value) {
                        showError(this, 'This field is required');
                        return;
                    }
                    
                    // Specific field validations
                    switch(name) {
                        case 'username':
                            if (value) {
                                // Check if it's an email or username
                                if (value.includes('@')) {
                                    if (!validateEmail(value)) {
                                        showError(this, 'Please enter a valid email address');
                                    } else {
                                        showSuccess(this);
                                    }
                                } else {
                                    if (!validateUsername(value)) {
                                        showError(this, 'Username should be 3-20 characters, letters, numbers, and underscores only');
                                    } else {
                                        showSuccess(this);
                                    }
                                }
                            }
                            break;
                            
                        case 'password':
                            if (value && value.length < 6) {
                                showError(this, 'Password should be at least 6 characters long');
                            } else if (value) {
                                showSuccess(this);
                            }
                            break;
                    }
                });
                
                input.addEventListener('input', function() {
                    if (this.classList.contains('invalid') || this.classList.contains('valid')) {
                        clearValidation(this);
                    }
                });
            });
            
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();
                console.log('Form submitted');
                
                // Validate all fields before submission
                let isValid = true;
                inputs.forEach(input => {
                    input.dispatchEvent(new Event('blur'));
                    if (input.classList.contains('invalid')) {
                        isValid = false;
                    }
                });
                
                if (!isValid) {
                    alert('Please fix all validation errors before submitting.');
                    return;
                }
                
                const formData = new FormData(this);
                const username = formData.get('username');
                const password = formData.get('password');
                
                console.log('Username:', username);
                console.log('Password length:', password ? password.length : 0);
                
                if (!username || !password) {
                    alert('Please fill in all required fields.');
                    return;
                }
                
                const submitBtn = this.querySelector('.registration-button');
                const originalText = submitBtn.textContent;
                
                try {
                    submitBtn.textContent = 'Logging in...';
                    submitBtn.disabled = true;
                    
                    console.log('Sending login request to:', '/api/login');
                    
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ username, password })
                    });
                    
                    console.log('Response status:', response.status);
                    console.log('Response ok:', response.ok);
                    
                    const result = await response.json();
                    console.log('Server response:', result);
                    
                    if (result.success) {
                        console.log('Login successful');
                        sessionStorage.setItem('userId', result.user.userId);
                        sessionStorage.setItem('userInfo', JSON.stringify(result.user));
                        window.location.href = 'profile.html';
                    } else {
                        console.error('Login failed:', result.message);
                        alert('Login failed: ' + result.message);
                    }
                    
                } catch (error) {
                    console.error('Login error:', error);
                    alert('Login failed: ' + error.message);
                } finally {
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;
                }
            });
        });
    </script>
</body>
</html>
